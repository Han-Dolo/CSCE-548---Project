<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus RSVP Client</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="hero">
    <h1>Campus Event RSVP Client</h1>
    <p>Project 3 frontend for Campus RSVP API</p>
    <p class="hint">Tip: use id 0 to create new records, or an existing id to update.</p>
  </header>

  <main class="layout">
    <section class="card">
      <h2>Connection</h2>
      <div class="row">
        <button id="btnHealth">Check Connection</button>
      </div>
      <div id="healthOut" class="output"></div>
    </section>

    <section class="card">
      <h2>Venues</h2>
      <div class="row">
        <button id="venuesGetAll">Show All Venues</button>
        <input id="venuesGetId" type="number" placeholder="venueId">
        <button id="venuesGetOne">Find Venue by ID</button>
      </div>
      <form id="venuesForm" class="form-grid">
        <input id="venueId" type="number" placeholder="venueId (0 for create)" value="0">
        <input id="venueName" type="text" placeholder="name" required>
        <input id="venueBuilding" type="text" placeholder="building" required>
        <input id="venueRoom" type="text" placeholder="room" required>
        <input id="venueCapacity" type="number" placeholder="capacity" required>
        <label class="checkbox"><input id="venueOutdoor" type="checkbox"> Outdoor</label>
        <button type="submit">Save Venue (Create/Update)</button>
      </form>
      <div class="row">
        <input id="venuesDeleteId" type="number" placeholder="venueId">
        <button id="venuesDelete">Delete Venue by ID</button>
      </div>
      <div id="venuesOut" class="output"></div>
    </section>

    <section class="card">
      <h2>Attendees</h2>
      <div class="row">
        <button id="attendeesGetAll">Show All Attendees</button>
        <input id="attendeesGetId" type="number" placeholder="attendeeId">
        <button id="attendeesGetOne">Find Attendee by ID</button>
      </div>
      <form id="attendeesForm" class="form-grid">
        <input id="attendeeId" type="number" placeholder="attendeeId (0 for create)" value="0">
        <input id="attendeeFirstName" type="text" placeholder="firstName" required>
        <input id="attendeeLastName" type="text" placeholder="lastName" required>
        <input id="attendeeEmail" type="email" placeholder="email" required>
        <input id="attendeeMajor" type="text" placeholder="major" required>
        <input id="attendeeClassYear" type="number" placeholder="classYear" required>
        <button type="submit">Save Attendee (Create/Update)</button>
      </form>
      <div class="row">
        <input id="attendeesDeleteId" type="number" placeholder="attendeeId">
        <button id="attendeesDelete">Delete Attendee by ID</button>
      </div>
      <div id="attendeesOut" class="output"></div>
    </section>

    <section class="card">
      <h2>Events</h2>
      <div class="row">
        <button id="eventsGetAll">Show All Events</button>
        <input id="eventsGetId" type="number" placeholder="eventId">
        <button id="eventsGetOne">Find Event by ID</button>
      </div>
      <form id="eventsForm" class="form-grid">
        <input id="eventId" type="number" placeholder="eventId (0 for create)" value="0">
        <input id="eventTitle" type="text" placeholder="title" required>
        <input id="eventDescription" type="text" placeholder="description" required>
        <input id="eventDate" type="date" required>
        <input id="eventStartTime" type="time" required>
        <input id="eventEndTime" type="time" required>
        <input id="eventVenueId" type="number" placeholder="venueId" required>
        <input id="eventOrganizer" type="text" placeholder="organizer" required>
        <input id="eventCategory" type="text" placeholder="category" required>
        <button type="submit">Save Event (Create/Update)</button>
      </form>
      <div class="row">
        <input id="eventsDeleteId" type="number" placeholder="eventId">
        <button id="eventsDelete">Delete Event by ID</button>
      </div>
      <div id="eventsOut" class="output"></div>
    </section>

    <section class="card">
      <h2>RSVPs</h2>
      <div class="row">
        <button id="rsvpsGetAll">Show All RSVPs</button>
        <input id="rsvpsGetId" type="number" placeholder="rsvpId">
        <button id="rsvpsGetOne">Find RSVP by ID</button>
      </div>
      <div class="row">
        <input id="rsvpsEventId" type="number" placeholder="eventId">
        <button id="rsvpsGetByEvent">Show RSVPs by Event ID</button>
      </div>
      <form id="rsvpsForm" class="form-grid">
        <input id="rsvpId" type="number" placeholder="rsvpId (0 for create)" value="0">
        <input id="rsvpEventId" type="number" placeholder="eventId" required>
        <input id="rsvpAttendeeId" type="number" placeholder="attendeeId" required>
        <select id="rsvpStatus" required>
          <option value="Going">Going</option>
          <option value="Interested">Interested</option>
          <option value="Not Going">Not Going</option>
        </select>
        <label class="checkbox"><input id="rsvpCheckedIn" type="checkbox"> Checked In</label>
        <button type="submit">Save RSVP (Create/Update)</button>
      </form>
      <div class="row">
        <input id="rsvpsDeleteId" type="number" placeholder="rsvpId">
        <button id="rsvpsDelete">Delete RSVP by ID</button>
      </div>
      <div id="rsvpsOut" class="output"></div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
